ne if it is part of a denial of service attack and then blocking suspected traffic?", "choices": ["Upstream filtering", "SYN cookies", "SPI firewalls", "Micro blocks"]}, {"week": 4, "q": "The command-line command that determines how many milliseconds the ping utility will wait for a response from the target is ping __________.", "choices": ["-w", "-i", "-j", "-s"]}, {"week": 4, "q": "The command-line command to instruct the ping utility to send packets until explicitly told to stop is ping __________.", "choices": ["-t", "-u", "-s", "-l"]}, {"week": 4, "q": "The attack in which the attacker sends a forged packet with the same source IP address and destination IP address is a __________ attack.", "choices": ["Land", "PDoS", "Teardrop", "UDP flood"]}, {"week": 4, "q": "The attack in which the attacker sends a fragmented message that the victim cannot reconstruct is a(n) __________ attack.", "choices": ["Teardrop", "PoD", "ICMP flood", "Land"]}, {"week": 4, "q": "The attack in which the attacker sends a packet that is too large and can shut down a target machine is a(n) __________ attack.", "choices": ["PoD", "ICMP flood", "Teardrop", "UDP Flood"]}, {"week": 4, "q": "One defense against denial of service attacks is to __________ ICMP packets.", "choices": ["Block", "Convert", "Permit", "Modify"]}, {"week": 4, "q": "A Distributed Denial of Service (DDoS) attack is different from a DoS attack because it:", "choices": ["Is launched from multiple systems", "Only affects cloud systems", "Targets specific firewalls", "Is a type of malware"]}, {"week": 4, "q": "Which of the following is a common goal of a DoS attack?", "choices": ["To overload a system and make it unavailable", "To steal sensitive information", "To encrypt data for ransom", "To install spyware on a system"]}, {"week": 4, "q": "In a Smurf attack, what is used to flood a victim with traffic?", "choices": ["ICMP echo requests", "TCP SYN packets", "HTTP GET requests", "DNS responses"]}, {"week": 4, "q": "Which of  antivirus software.", "choices": ["False", "True"]}, {"week": 5, "q": "The C10P virus not only encrypted files but it also affected Windows processes. As a result of it being a ransomware variant, it caused __________ million dollars in damages.", "choices": ["500", "100", "50", "250"]}, {"week": 5, "q": "Which malware type is typically bundled with free software to serve advertisements?", "choices": ["Adware", "Worm", "Keylogger", "Virus"]}, {"week": 5, "q": "Which of the following attacks is commonly associated with ransomware?", "choices": ["Data encryption", "Phishing", "Website defacement", "DoS attack"]}, {"week": 5, "q": "A rootkit provides the hacker root or privileged access.", "choices": ["True", "False"]}, {"week": 5, "q": "A common way for a virus to spread is by emailing itself to contacts in your email address book.", "choices": ["True", "False"]}, {"week": 5, "q": "An unsolicited e-mail.", "choices": ["Spam", "Logic bomb", "Trojan horse", "Advertising"]}, {"week": 5, "q": "Which type of malware can turn a system into a 'zombie' for use in large-scale attacks?", "choices": ["Botnet malware", "Worm", "Spyware", "Adware"]}, {"week": 5, "q": "One way to mitigate threats is to keep your antivirus software up-to-date.", "choices": ["True", "False"]}, {"week": 5, "q": "A version of a trojan horse can activate on a certain date and time and destroy files.", "choices": ["True", "False"]}, {"week": 5, "q": "When opening an e-mail attachment, it is ok to initially open them because a potential virus will not activate until you unlock it when the pop up warning box shows itself.", "choices": ["False", "True"]}, {"week": 5, "q": "The malware that was specifically designed by the U.S. government for espionage is the __________ virus.", "choices": ["Flame", "Schlayer", "FakeAV", "Nonvirus"]}, {"week": 5, "q": "After a virus is on your system, it can do anything a legitimate program can do.", "choices": ["True", "False"]}, {"week": 5, "q": "What is the primary diffe mory?", "choices": ["RAM", "USB", "HDD", "SSD"]}, {"week": 14, "q": "__________ can include logs, portable storage devices, emails, tablets, and cell phones.", "choices": ["Computer evidence", "Network devices", "The Windows Registry", "Ancillary hardware"]}, {"week": 14, "q": "__________ is a free tool that can be used to recover Windows files.", "choices": ["FTK Imager", "SearchIt", "DiskDigger", "FileRecover"]}, {"week": 14, "q": "If you fail to handle evidence properly __________.", "choices": ["It may be unusable in court", "You may damage the hard drive", "None of the above", "Law enforcement may not look at it"]}, {"week": 14, "q": "Usually, the first thing you do to a computer to prevent further tampering is to __________.", "choices": ["Take it offline", "Make a backup", "Lock it in a secure room", "Make a copy"]}, {"week": 14, "q": "Which type of file system is commonly used in Windows-based systems and must be understood in forensic investigations due to its permissions?", "choices": ["NTFS", "FAT16", "HFS+", "EXT4"]}, {"week": 14, "q": "It is permissible to access and analyze encrypted files without a warrant if they are part of a digital forensic investigation.", "choices": ["False", "True"]}, {"week": 14, "q": "Deleted files are immediately and completely removed from a computer's hard drive.", "choices": ["False", "True"]}, {"week": 8, "q": "Virtual Private Networks (VPNs) primarily provide:", "choices": ["Encryption of data over public networks", "Authentication", "Bandwidth management", "Anonymity"]}, {"week": 8, "q": "Heuristic scanning uses rules to determine whether a file or program behaves like a virus.", "choices": ["True", "False"]}];
// Tag each with its correct answer (always index 0 in source) before we shuffle choices.
QUESTIONS.forEach((q, i) => { q.id = i; q.correct = q.choices[0]; });

const quizEl = document.getElementById("quiz");
const weekSel = document.getElementById("week-filter");
const scoreEl = document.getElementById("score");
const answeredEl = document.getElementById("answered");
const totalEl = document.getElementById("total");

const weeks = [...new Set(QUESTIONS.map(q => q.week))].sort((a,b)=>a-b);
for (const w of weeks) {
  const o = document.createElement("option");
  o.value = w; o.textContent = "Week " + w;
  weekSel.appendChild(o);
}

let score = 0, answered = 0;
function updateStats(total) {
  scoreEl.textContent = score;
  answeredEl.textContent = answered;
  totalEl.textContent = total;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render() {
  score = 0; answered = 0;
  quizEl.innerHTML = "";
  const wk = weekSel.value;
  const filtered = QUESTIONS.filter(q => wk === "all" || String(q.week) === wk);
  const shown = shuffle(filtered);
  shown.forEach((q, idx) => {
    const card = document.createElement("section");
    card.className = "q";
    card.innerHTML = `<div class="week">Week ${q.week} · Q${idx+1}</div><div class="text"></div><div class="choices"></div><div class="feedback"></div>`;
    card.querySelector(".text").textContent = q.q;
    const choicesEl = card.querySelector(".choices");
    const feedback = card.querySelector(".feedback");
    const shuffled = shuffle(q.choices);
    shuffled.forEach(choice => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "choice";
      btn.textContent = choice;
      btn.addEventListener("click", () => {
        if (btn.disabled) return;
        const isRight = choice === q.correct;
        // disable all
        choicesEl.querySelectorAll("button").forEach(b => {
          b.disabled = true;
          if (b.textContent === q.correct) b.classList.add("correct");
        });
        if (!isRight) btn.classList.add("wrong");
        feedback.classList.add(isRight ? "right" : "wrong");
        feedback.textContent = isRight
          ? "Correct."
          : `Wrong — correct answer: ${q.correct}`;
        answered++;
        if (isRight) score++;
        updateStats(shown.length);
      });
      choicesEl.appendChild(btn);
    });
    quizEl.appendChild(card);
  });
  updateStats(shown.length);
}

document.getElementById("shuffle").addEventListener("click", render);
document.getElementById("reset").addEventListener("click", render);
weekSel.addEventListener("change", render);
render();
</script>
